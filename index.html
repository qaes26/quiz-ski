<html lang="ar" dir="rtl">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
            padding-bottom: 100px;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 3rem;
            padding: 2rem;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: var(--primary);
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .author {
            color: #c084fc;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .chapter-title {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            font-weight: 800;
            margin: 3rem 0 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(129, 140, 248, 0.3);
            display: inline-block;
        }

        .question-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .question-card:hover {
            border-color: var(--primary);
        }

        .q-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }

        .q-number {
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-left: 1rem;
        }

        .q-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .options-grid {
            display: grid;
            gap: 0.8rem;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 1rem;
            background-color: rgba(15, 23, 42, 0.5);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-label:hover:not(.disabled) {
            background-color: rgba(56, 189, 248, 0.05);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .option-input {
            display: none;
        }

        .custom-radio {
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            margin-left: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .option-input:checked + .custom-radio {
            border-color: var(--primary);
        }

        .option-input:checked + .custom-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: var(--primary);
            border-radius: 50%;
        }

        .disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .correct-answer {
            background-color: var(--success-bg) !important;
            border-color: var(--success) !important;
            color: var(--success);
        }

        .correct-answer .custom-radio {
            border-color: var(--success);
            background-color: var(--success);
        }
        .correct-answer .custom-radio::after { display: none; }
        .correct-answer::before {
            content: '✔';
            position: absolute;
            left: 20px;
            font-size: 1.2rem;
        }

        .wrong-answer {
            background-color: var(--error-bg) !important;
            border-color: var(--error) !important;
            color: var(--error);
        }

        .wrong-answer .custom-radio {
            border-color: var(--error);
            background-color: var(--error);
        }
        .wrong-answer .custom-radio::after { display: none; }
        .wrong-answer::before {
            content: '✘';
            position: absolute;
            left: 20px;
            font-size: 1.2rem;
        }

        .option-label { position: relative; }

        #score-board {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            padding: 1rem 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            gap: 2rem;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .score-text { color: var(--primary); }
        .progress-text { color: var(--text-muted); }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .question-card { padding: 1rem; }
            #score-board { width: 90%; justify-content: center; font-size: 1rem; gap: 1rem; padding: 0.8rem; }
        }
    </style>
</head>

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const container = document.getElementById('quiz-container');
        let currentChapter = "";

        // بناء الواجهة
        rawData.forEach((item, index) => {
            const qNumber = index + 1;
            
            if (item.c !== currentChapter) {
                currentChapter = item.c;
                const chapterEl = document.createElement('h2');
                chapterEl.className = 'chapter-title';
                chapterEl.textContent = currentChapter;
                container.appendChild(chapterEl);
            }

            let options = [
                { text: item.a, isCorrect: true },
                { text: item.w[0], isCorrect: false },
                { text: item.w[1], isCorrect: false },
                { text: item.w[2], isCorrect: false }
            ];
            options = shuffleArray(options);

            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${qNumber}`;

            let optionsHtml = '';
            options.forEach((opt, optIndex) => {
                const optId = `q${qNumber}_o${optIndex}`;
                optionsHtml += `
                    <label class="option-label" id="label_${optId}">
                        <input type="radio" name="q${qNumber}" class="option-input" value="${opt.isCorrect}" onchange="checkAnswer(${qNumber}, '${optId}', ${opt.isCorrect})">
                        <div class="custom-radio"></div>
                        <span style="margin-right: 15px;">${opt.text}</span>
                    </label>
                `;
            });

            card.innerHTML = `
                <div class="q-header">
                    <span class="q-number">${qNumber} / ${totalQuestions}</span>
                </div>
                <div class="q-text">${item.q}</div>
                <div class="options-grid" id="options_q${qNumber}">
                    ${optionsHtml}
                </div>
            `;
            container.appendChild(card);
        });

        window.checkAnswer = function(qNumber, selectedOptId, isCorrect) {
            const optionsContainer = document.getElementById(`options_q${qNumber}`);
            const allLabels = optionsContainer.querySelectorAll('.option-label');
            const allInputs = optionsContainer.querySelectorAll('.option-input');

            // إيقاف تفاعل الخيارات للسؤال المُجاب
            allInputs.forEach(input => input.disabled = true);
            allLabels.forEach(label => label.classList.add('disabled'));

            // إظهار النتيجة والتلوين
            if (isCorrect) {
                document.getElementById(`label_${selectedOptId}`).classList.add('correct-answer');
                currentScore++;
            } else {
                document.getElementById(`label_${selectedOptId}`).classList.add('wrong-answer');
                allInputs.forEach(input => {
                    if (input.value === "true") {
                        input.closest('.option-label').classList.add('correct-answer');
                    }
                });
            }

            // تحديث العداد
            answeredQuestions++;
            document.getElementById('score').textContent = currentScore;
            document.getElementById('progress').textContent = answeredQuestions;

            if (answeredQuestions === totalQuestions) {
                setTimeout(() => {
                    alert(`أحسنت بإنهاء المراجعة!\nنتيجتك النهائية هي: ${currentScore} من ${totalQuestions}`);
                }, 500);
            }
        };
    </script>
</body>
</html>
